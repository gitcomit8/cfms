version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cfms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: cfms_password
      MYSQL_DATABASE: cfms
      MYSQL_USER: cfms_user
      MYSQL_PASSWORD: cfms_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data: